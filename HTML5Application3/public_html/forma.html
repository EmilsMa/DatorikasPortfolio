<html lang="lv">
<head>
    <title>Klakulators</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="CSS/mansStils.css">
</head>
<div class="w3-container" style="padding: 10px 0;">
  <a href="index.html" class="w3-button w3-black w3-round-large">« Atpakaļ uz sākumu</a>
</div>
<script>
function rekinat(operacija) {
    let n1 = parseFloat(document.getElementById('sk1').value);
    let n2 = parseFloat(document.getElementById('sk2').value);
    let rez = 0;
    
    if (operacija === '+') rez = n1 + n2;
    if (operacija === '-') rez = n1 - n2;
    if (operacija === '/') rez = n1 / n2;
    
    if (Number.isNaN(rez)) rez = "Nav korekti ievadīti skaitļi"

    document.getElementById('rezultats').innerHTML = "Rezultāts: " + rez;
}
</script>

<form>
    <input type="number" id="sk1">
    <input type="number" id="sk2">
    <button type="button" onclick="rekinat('+')">+</button>
    <button type="button" onclick="rekinat('-')">-</button>
    <button type="button" onclick="rekinat('/')">/</button>
    <button type="reset">Reset</button>
    <p id="rezultats">Rezultāts: </p>
</form>
</html>
